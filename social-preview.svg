  <circle cx="960" cy="395" r="36" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
  <circle cx="830" cy="360" r="24" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  <circle cx="1030" cy="475" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- Logo mark -->
  <text x="80" y="170" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="3">DATENGRAF</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#ffffff">Datenflüsse</text>
