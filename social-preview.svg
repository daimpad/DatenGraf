  <line x1="960" y1="395" x2="830" y2="360" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="960" y1="395" x2="1030" y2="475" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="1110" y1="310" x2="1030" y2="475" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <circle cx="900" cy="200" r="42" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
