      <stop offset="0%" style="stop-color:#420093"/>
      <stop offset="100%" style="stop-color:#6c2fbf"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative network (right side) -->
