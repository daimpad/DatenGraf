<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datengraf</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
  <style>
    /* ── Design Tokens ───────────────────────────────────────────── */
    :root {
      --c-bg:        #f0f2f5;
      --c-surface:   #ffffff;
      --c-border:    #e0e0e0;
      --c-text:      #1a1a1a;
      --c-muted:     #666;
      --c-accent:    #1a1a1a;
      --c-accent-h:  #3b78e7;
      --c-danger:    #c0392b;
      --c-success:   #27ae60;
      --c-warn:      #e67e22;

      --rel-übergibt:   #4285F4;
      --rel-nutzt:      #34A853;
      --rel-erstellt:   #FBBC05;
      --rel-empfängt:   #EA4335;
      --rel-verarbeitet:#8F44AD;

      --schutz-dsgvo:   #EA4335;
      --schutz-intern:  #e67e22;
      --schutz-oeffentlich: #34A853;

      --erfassung-manuell:       #8F44AD;
      --erfassung-automatisiert: #4285F4;

      --sidebar-w: 280px;
      --radius: 6px;
      --shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--c-surface);
      border-right: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      transition: transform .25s;
    }

    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); position: fixed; }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 15px;
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--c-border);
    }

    .sidebar-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--c-muted);
      margin-bottom: 10px;
    }

    .filter-group { margin-bottom: 10px; }
    .filter-group label { display: block; font-size: 12px; color: var(--c-muted); margin-bottom: 4px; }

    .filter-group select,
    .filter-group input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 13px;
      background: #fafafa;
    }

    .filter-group select:focus,
    .filter-group input:focus { outline: none; border-color: var(--c-accent); }

    .chip-group { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--c-border);
      font-size: 11px;
      cursor: pointer;
      background: #fafafa;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }

    .chip.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
    .chip:hover:not(.active) { border-color: var(--c-accent); }

    .sidebar-actions { padding: 14px 16px; margin-top: auto; display: flex; flex-direction: column; gap: 6px; }

    /* ── Main area ───────────────────────────────────────────────── */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand { font-weight: 800; font-size: 18px; letter-spacing: -.5px; }

    .topbar-tabs { display: flex; gap: 2px; margin-left: 20px; }

    .topbar-tab {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--c-muted);
      font-weight: 500;
      transition: background .12s, color .12s;
    }

    .topbar-tab:hover { background: var(--c-bg); color: var(--c-text); }
    .topbar-tab.active { background: var(--c-accent); color: #fff; }

    .topbar-spacer { flex: 1; }

    .content { flex: 1; padding: 20px; overflow: auto; }

    /* ── Import panel ────────────────────────────────────────────── */
    .import-panel {
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .import-panel-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }

    .import-panel-header.open { border-bottom-color: var(--c-border); }
    .import-panel-title { font-weight: 600; font-size: 14px; }
    .import-panel-toggle { margin-left: auto; font-size: 12px; color: var(--c-muted); }

    .import-panel-body { padding: 16px; display: none; }
    .import-panel-body.open { display: block; }

    .import-method-tabs { display: flex; gap: 4px; margin-bottom: 14px; }

    .import-method-tab {
      padding: 6px 14px;
      border: 1.5px solid var(--c-border);
      border-radius: 20px;
      background: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--c-muted);
      transition: all .12s;
    }

    .import-method-tab.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }

    .import-section { display: none; }
    .import-section.active { display: block; }

    .url-row { display: flex; gap: 8px; }
    .url-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 13px; }
    .url-row input:focus { outline: none; border-color: var(--c-accent); }

    .file-drop-zone {
      border: 2px dashed var(--c-border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      color: var(--c-muted);
      cursor: pointer;
      position: relative;
      transition: border-color .15s, background .15s;
    }

    .file-drop-zone:hover, .file-drop-zone.drag-over { border-color: var(--c-accent); background: #f8f8f8; }
    .file-drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    textarea.csv-textarea {
      width: 100%;
      height: 180px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      resize: vertical;
    }

    textarea.csv-textarea:focus { outline: none; border-color: var(--c-accent); }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .12s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-primary { background: var(--c-accent); color: #fff; }
    .btn-primary:hover { background: var(--c-accent-h); }
    .btn-secondary { background: #f0f0f0; color: var(--c-text); }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: var(--c-danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { width: 30px; height: 30px; padding: 0; justify-content: center; }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }

    #status-message { margin-top: 8px; font-size: 12px; min-height: 16px; }
    #status-message.error   { color: var(--c-danger); }
    #status-message.success { color: var(--c-success); }
    #status-message.loading { color: var(--c-muted); }

    /* ── Tab content panels ──────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── List view ───────────────────────────────────────────────── */
    .list-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .stat-pill {
      padding: 5px 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .rel-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
      border-left-width: 4px;
      margin-bottom: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rel-node {
      padding: 4px 10px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
    }

    .rel-arrow { color: var(--c-muted); font-size: 16px; }
    .rel-type { font-size: 12px; font-weight: 600; color: var(--c-muted); }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .badge-data   { background: #fff3cd; color: #856404; }
    .badge-freq   { background: #d1e7dd; color: #0f5132; }
    .badge-format { background: #f8d7da; color: #842029; }
    .badge-dsgvo  { background: #f8d7da; color: #842029; }
    .badge-intern { background: #fff3cd; color: #856404; }
    .badge-oeffentlich { background: #d1e7dd; color: #0f5132; }
    .badge-manuell      { background: #e8d5f5; color: #6f42c1; }
    .badge-automatisiert{ background: #cfe2ff; color: #0a58ca; }

    .rel-card-actions { margin-left: auto; }

    /* ── Network view ────────────────────────────────────────────── */
    .network-toolbar {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    #network-container {
      background: #fff;
      border: 1px solid var(--c-border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      height: 560px;
    }

    .fullscreen #network-container { height: calc(100vh - 52px); }

    .fullscreen {
      position: fixed !important;
      inset: 0;
      z-index: 9999;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    /* ── Insights / Dashboard ────────────────────────────────────── */
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .insight-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .insight-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--c-border);
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .insight-card-icon { font-size: 18px; }

    .insight-card-body { padding: 12px 16px; }

    .rank-list { list-style: none; }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .rank-item:last-child { border-bottom: none; }

    .rank-pos {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--c-bg);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rank-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .rank-bar-wrap { width: 80px; height: 6px; background: var(--c-bg); border-radius: 3px; }
    .rank-bar { height: 100%; border-radius: 3px; background: var(--c-accent); }

    .rank-value { font-size: 11px; color: var(--c-muted); width: 30px; text-align: right; }

    .cluster-list { display: flex; flex-direction: column; gap: 8px; }

    .cluster-item {
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--c-bg);
      font-size: 12px;
    }

    .cluster-title { font-weight: 600; margin-bottom: 4px; }
    .cluster-nodes { color: var(--c-muted); line-height: 1.5; }

    .insight-empty { color: var(--c-muted); font-size: 13px; padding: 8px 0; }

    /* ── Wizard Modal ────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.hidden { display: none; }

    .wizard {
      background: var(--c-surface);
      border-radius: 10px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      overflow: hidden;
    }

    .wizard-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--c-border);
    }

    .wizard-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }

    .step-indicators {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .step-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .step-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      background: var(--c-bg);
      color: var(--c-muted);
      border: 2px solid var(--c-border);
      flex-shrink: 0;
      transition: all .2s;
    }

    .step-dot.done { background: var(--c-success); border-color: var(--c-success); color: #fff; }
    .step-dot.active { background: var(--c-accent); border-color: var(--c-accent); color: #fff; }

    .step-label { color: var(--c-muted); font-size: 11px; }
    .step-label.active { color: var(--c-text); font-weight: 600; }

    .step-line { flex: 1; height: 2px; background: var(--c-border); border-radius: 1px; }
    .step-line.done { background: var(--c-success); }

    .wizard-body { padding: 20px 24px; min-height: 260px; }

    .wizard-step { display: none; }
    .wizard-step.active { display: block; }

    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--c-muted); text-transform: uppercase; letter-spacing: .05em; }

    .form-row input[type="text"],
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 9px 11px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      background: #fafafa;
      transition: border-color .12s;
    }

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { outline: none; border-color: var(--c-accent); background: #fff; }

    .form-row textarea { height: 70px; resize: vertical; }

    .form-row-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .radio-group { display: flex; flex-direction: column; gap: 6px; }

    .radio-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }

    .radio-option:hover { border-color: var(--c-accent); background: #f8f8f8; }
    .radio-option.selected { border-color: var(--c-accent); background: #f0f4ff; }
    .radio-option input[type="radio"] { margin-top: 2px; flex-shrink: 0; }
    .radio-option-label { font-weight: 600; font-size: 13px; }
    .radio-option-desc { font-size: 11px; color: var(--c-muted); margin-top: 2px; }

    .wizard-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--c-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fafafa;
    }

    .wizard-footer .step-hint { font-size: 11px; color: var(--c-muted); }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
      font-size: 12px;
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Misc ────────────────────────────────────────────────────── */
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--c-muted);
    }

    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    #sidebar-toggle-btn {
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 200; height: 100vh; }
      .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .insights-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Wizard Modal ────────────────────────────────────────────── -->
<div class="modal-backdrop hidden" id="wizard-backdrop">
  <div class="wizard" role="dialog" aria-modal="true">
    <div class="wizard-header">
      <div class="wizard-title" id="wizard-title">Neuen Datenfluss erfassen</div>
      <div class="step-indicators" id="step-indicators"></div>
    </div>
    <div class="wizard-body" id="wizard-body"></div>
    <div class="wizard-footer">
      <span class="step-hint" id="wizard-hint"></span>
      <div class="btn-row" style="margin:0">
        <button class="btn btn-secondary btn-sm" id="wizard-cancel">Abbrechen</button>
        <button class="btn btn-secondary btn-sm" id="wizard-back">← Zurück</button>
        <button class="btn btn-primary btn-sm" id="wizard-next">Weiter →</button>
      </div>
    </div>
  </div>
</div>

<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>Filter</span>
      <button class="btn btn-secondary btn-sm" id="clear-filters-btn">Zurücksetzen</button>
    </div>

    <div class="sidebar-section">
      <h3>Beziehungstyp</h3>
      <div class="chip-group" id="filter-chips-relation"></div>
    </div>

    <div class="sidebar-section">
      <h3>Schutzbedarf</h3>
      <div class="chip-group" id="filter-chips-schutz"></div>
    </div>

    <div class="sidebar-section">
      <h3>Erfassungsart</h3>
      <div class="chip-group" id="filter-chips-erfassung"></div>
    </div>

    <div class="sidebar-section">
      <h3>Organisation</h3>
      <div class="filter-group">
        <select id="filter-organization"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Abteilung</h3>
      <div class="filter-group">
        <select id="filter-department"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Häufigkeit</h3>
      <div class="filter-group">
        <select id="filter-frequency"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Format</h3>
      <div class="filter-group">
        <select id="filter-format"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Suche</h3>
      <div class="filter-group">
        <input type="text" id="filter-search" placeholder="Akteur suchen…">
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn btn-secondary btn-sm" id="export-csv-btn">⬇ CSV exportieren</button>
      <button class="btn btn-secondary btn-sm" id="save-local-btn">💾 Im Browser speichern</button>
      <button class="btn btn-secondary btn-sm" id="load-local-btn">📂 Aus Browser laden</button>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <button class="btn btn-secondary btn-icon" id="sidebar-toggle-btn" title="Filter ein-/ausblenden">☰</button>
      <span class="topbar-brand">Datengraf</span>
      <nav class="topbar-tabs">
        <button class="topbar-tab active" data-tab="list">Listenansicht</button>
        <button class="topbar-tab" data-tab="network">Netzwerkkarte</button>
        <button class="topbar-tab" data-tab="insights">Netzwerk-Insights</button>
      </nav>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="open-wizard-btn">+ Datenfluss erfassen</button>
    </div>

    <div class="content">

      <!-- Import Panel -->
      <div class="import-panel">
        <div class="import-panel-header" id="import-toggle">
          <span>📥</span>
          <span class="import-panel-title">CSV importieren</span>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
const REL_COLORS = {
  'übergibt':    'var(--rel-übergibt)',
  'nutzt':       'var(--rel-nutzt)',
  'erstellt':    'var(--rel-erstellt)',
  'empfängt':    'var(--rel-empfängt)',
  'verarbeitet': 'var(--rel-verarbeitet)'
};

const REL_COLORS_HEX = {
  'übergibt':    '#4285F4',
  'nutzt':       '#34A853',
  'erstellt':    '#FBBC05',
  'empfängt':    '#EA4335',
  'verarbeitet': '#8F44AD'
};

const SCHUTZ_OPTS = ['DSGVO-relevant', 'Intern', 'Öffentlich'];
const ERFASSUNG_OPTS = ['Manuell', 'Automatisiert'];
const ROLLEN_OPTS = ['Datenproduzent', 'Datenkonsument', 'Gatekeeper', 'Datenverwalter', 'Datenverarbeiter', 'Datenersteller', 'Datennutzer'];
const BEZIEHUNG_OPTS = ['übergibt', 'nutzt', 'erstellt', 'empfängt', 'verarbeitet'];
const LS_KEY = 'datengraf_data';

const COSE_OPTS = {
  name: 'cose',
  idealEdgeLength: 120, nodeOverlap: 20, refresh: 20,
  fit: true, padding: 30, randomize: false,
  componentSpacing: 120, nodeRepulsion: 450000,
  edgeElasticity: 100, nestingFactor: 5, gravity: 80,
  numIter: 1000, initialTemp: 200, coolingFactor: 0.95, minTemp: 1.0
};

// ── State ────────────────────────────────────────────────────────────────────
let allData = [];
let filteredData = [];
let networkChart = null;
let pendingFileText = null;
let activeFilters = {
  relation: new Set(),
  schutz: new Set(),
  erfassung: new Set(),
  organization: 'all',
  department: 'all',
  frequency: 'all',
  format: 'all',
  search: ''
};

// ── CSV Parser ───────────────────────────────────────────────────────────────
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.trim());
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const values = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, j) => { obj[h] = (values[j] ?? '').trim(); });
    result.push(obj);
  }
  return result;
}

function splitCSVLine(line) {
  const values = [];
  let inQuotes = false, temp = '';
  for (const ch of line) {
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { values.push(unquote(temp)); temp = ''; }
    else { temp += ch; }
  }
  values.push(unquote(temp));
  return values;
}

function unquote(s) {
  s = s.trim();
  if (s.startsWith('"') && s.endsWith('"')) return s.slice(1, -1);
  return s;
}

function toCSV(data) {
  const headers = ['Quelle','QuelleAbteilung','QuelleBereich','QuelleOrganisation','QuelleRolle',
    'Beziehung','Ziel','Datentyp','Häufigkeit','Format','Schutzbedarf','Erfassungsart','Anmerkungen'];
  const escape = v => (v && v.includes(',')) ? `"${v}"` : (v || '');
  const rows = data.map(r => headers.map(h => escape(r[h] || '')).join(','));
  return [headers.join(','), ...rows].join('\n');
}

// ── Filters ──────────────────────────────────────────────────────────────────
function applyFilters() {
  filteredData = allData.filter(row => {
    if (activeFilters.relation.size > 0 && !activeFilters.relation.has(row.Beziehung)) return false;
    if (activeFilters.schutz.size > 0 && !activeFilters.schutz.has(row.Schutzbedarf)) return false;
    if (activeFilters.erfassung.size > 0 && !activeFilters.erfassung.has(row.Erfassungsart)) return false;
    if (activeFilters.organization !== 'all' && row.QuelleOrganisation !== activeFilters.organization) return false;
    if (activeFilters.department !== 'all' && row.QuelleAbteilung !== activeFilters.department) return false;
    if (activeFilters.frequency !== 'all' && row.Häufigkeit !== activeFilters.frequency) return false;
    if (activeFilters.format !== 'all' && row.Format !== activeFilters.format) return false;
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      if (!(row.Quelle || '').toLowerCase().includes(q) && !(row.Ziel || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });
  renderAll();
}

function clearFilters() {
  activeFilters = { relation: new Set(), schutz: new Set(), erfassung: new Set(),
    organization: 'all', department: 'all', frequency: 'all', format: 'all', search: '' };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('filter-organization').value = 'all';
  document.getElementById('filter-department').value = 'all';
  document.getElementById('filter-frequency').value = 'all';
  document.getElementById('filter-format').value = 'all';
  document.getElementById('filter-search').value = '';
  applyFilters();
}

// ── Sidebar filter UI ─────────────────────────────────────────────────────────
function buildSidebarFilters() {
  const rels = [...new Set(allData.map(r => r.Beziehung).filter(Boolean))];
  const schutze = [...new Set(allData.map(r => r.Schutzbedarf).filter(Boolean))];
  const erfassungen = [...new Set(allData.map(r => r.Erfassungsart).filter(Boolean))];

  buildChipGroup('filter-chips-relation', rels, 'relation');
  buildChipGroup('filter-chips-schutz', schutze, 'schutz');
  buildChipGroup('filter-chips-erfassung', erfassungen, 'erfassung');

  updateSelectFilter('filter-organization', [...new Set(allData.map(r => r.QuelleOrganisation).filter(Boolean))]);
  updateSelectFilter('filter-department', [...new Set(allData.map(r => r.QuelleAbteilung).filter(Boolean))]);
  updateSelectFilter('filter-frequency', [...new Set(allData.map(r => r.Häufigkeit).filter(Boolean))]);
  updateSelectFilter('filter-format', [...new Set(allData.map(r => r.Format).filter(Boolean))]);
}

function buildChipGroup(containerId, values, filterKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  values.forEach(val => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = val;
    chip.addEventListener('click', () => {
      if (activeFilters[filterKey].has(val)) {
        activeFilters[filterKey].delete(val);
        chip.classList.remove('active');
      } else {
        activeFilters[filterKey].add(val);
        chip.classList.add('active');
      }
      applyFilters();
    });
    container.appendChild(chip);
  });
}

function updateSelectFilter(id, options) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while (sel.options.length > 1) sel.options.remove(1);
  options.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    sel.appendChild(o);
  });
  if ([...options, 'all'].includes(cur)) sel.value = cur;
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function renderAll() {
  renderList(filteredData);
  renderNetwork(filteredData);
  renderInsights(filteredData);
}

// ── List view ─────────────────────────────────────────────────────────────────
function renderList(data) {
  const statsEl = document.getElementById('list-stats');
  const contentEl = document.getElementById('list-content');

  if (!data.length) {
    statsEl.innerHTML = '';
    contentEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Keine Daten vorhanden. CSV importieren oder Datenfluss erfassen.</p></div>';
    return;
  }

  const nodes = new Set([...data.map(r => r.Quelle), ...data.map(r => r.Ziel)].filter(Boolean));
  statsEl.innerHTML = `
    <span class="stat-pill">🔵 ${nodes.size} Akteure</span>
    <span class="stat-pill">🔗 ${data.length} Datenflüsse</span>
    <span class="stat-pill">🔒 ${data.filter(r => r.Schutzbedarf === 'DSGVO-relevant').length} DSGVO</span>
    <span class="stat-pill">🤖 ${data.filter(r => r.Erfassungsart === 'Automatisiert').length} automatisiert</span>
  `;

  contentEl.innerHTML = '';
  data.forEach((row, idx) => {
    if (!row.Quelle || !row.Ziel) return;
    const card = document.createElement('div');
    card.className = 'rel-card';
    card.style.borderLeftColor = REL_COLORS_HEX[row.Beziehung] || '#ccc';

    const schutzClass = row.Schutzbedarf === 'DSGVO-relevant' ? 'badge-dsgvo' :
                        row.Schutzbedarf === 'Intern' ? 'badge-intern' :
                        row.Schutzbedarf === 'Öffentlich' ? 'badge-oeffentlich' : '';
    const erfClass = row.Erfassungsart === 'Manuell' ? 'badge-manuell' :
                     row.Erfassungsart === 'Automatisiert' ? 'badge-automatisiert' : '';

    card.innerHTML = `
      <div class="rel-node">${esc(row.Quelle)}</div>
      <div class="rel-type">${esc(row.Beziehung)}</div>
      <div class="rel-arrow">→</div>
      <div class="rel-node">${esc(row.Ziel)}</div>
      ${row.Datentyp   ? `<span class="badge badge-data">${esc(row.Datentyp)}</span>` : ''}
      ${row.Häufigkeit ? `<span class="badge badge-freq">${esc(row.Häufigkeit)}</span>` : ''}
      ${row.Format     ? `<span class="badge badge-format">${esc(row.Format)}</span>` : ''}
      ${schutzClass    ? `<span class="badge ${schutzClass}">${esc(row.Schutzbedarf)}</span>` : ''}
      ${erfClass       ? `<span class="badge ${erfClass}">${esc(row.Erfassungsart)}</span>` : ''}
      <div class="rel-card-actions" style="margin-left:auto">
        <button class="btn btn-secondary btn-sm" data-del="${idx}" title="Löschen">✕</button>
      </div>
    `;
    contentEl.appendChild(card);
  });

  contentEl.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.del);
      allData.splice(allData.indexOf(filteredData[idx]), 1);
      applyFilters();
      buildSidebarFilters();
    });
  });
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Network view ─────────────────────────────────────────────────────────────
const CY_STYLE = [
  {
    selector: 'node',
    style: {
      label: 'data(id)',
      'text-valign': 'center', 'text-halign': 'center',
      'background-color': '#848484', color: '#fff',
      'font-size': '11px', 'text-outline-width': 1, 'text-outline-color': '#666',
      width: 'data(size)', height: 'data(size)',
      'text-wrap': 'wrap', 'text-max-width': '80px'
    }
  },
  {
    selector: 'edge',
    style: {
      width: 2, 'line-color': 'data(color)',
      'target-arrow-color': 'data(color)', 'target-arrow-shape': 'triangle',
      'curve-style': 'bezier', opacity: 0.8,
      label: 'data(type)', 'font-size': '9px',
      'text-rotation': 'autorotate',
      'text-background-color': '#fff', 'text-background-opacity': 0.8,
      'text-background-padding': '2px'
    }
  },
  { selector: '.highlighted', style: { 'background-color': '#ff5722', 'line-color': '#ff5722', 'target-arrow-color': '#ff5722', opacity: 1, 'z-index': 999 } },
  { selector: '.faded', style: { opacity: 0.15, 'z-index': 0 } },
  { selector: '.cluster-0', style: { 'background-color': '#4285F4' } },
  { selector: '.cluster-1', style: { 'background-color': '#34A853' } },
  { selector: '.cluster-2', style: { 'background-color': '#FBBC05' } },
  { selector: '.cluster-3', style: { 'background-color': '#EA4335' } },
  { selector: '.cluster-4', style: { 'background-color': '#8F44AD' } },
];

function prepareElements(data) {
  const nodes = new Map();
  const edges = [];

  data.forEach(row => {
    if (!row.Quelle || !row.Ziel || !row.Beziehung) return;

    if (!nodes.has(row.Quelle)) nodes.set(row.Quelle, { dept: row.QuelleAbteilung || '', org: row.QuelleOrganisation || '', out: 0, inn: 0 });
    nodes.get(row.Quelle).out++;

    if (!nodes.has(row.Ziel)) nodes.set(row.Ziel, { dept: '', org: '', out: 0, inn: 0 });
    nodes.get(row.Ziel).inn++;

    edges.push(row);
  });

  const elements = [];
  nodes.forEach((n, id) => {
    elements.push({ data: { id, dept: n.dept, org: n.org, size: 22 + Math.min(28, (n.out + n.inn) * 3) } });
  });
  edges.forEach((row, i) => {
    elements.push({ data: { id: `e${i}`, source: row.Quelle, target: row.Ziel, type: row.Beziehung, color: REL_COLORS_HEX[row.Beziehung] || '#999' } });
  });
  return elements;
}

function renderNetwork(data) {
  const container = document.getElementById('network-container');
  container.innerHTML = '';
  if (!data.length) return;

  networkChart = cytoscape({ container, elements: prepareElements(data), style: CY_STYLE, layout: COSE_OPTS });

  networkChart.on('tap', 'node', evt => {
    const node = evt.target;
    networkChart.elements().removeClass('highlighted faded');
    const edges = node.connectedEdges();
    const nbrs  = edges.connectedNodes();
    networkChart.elements().difference(node.union(edges).union(nbrs)).addClass('faded');
    node.union(edges).union(nbrs).addClass('highlighted');
  });
  networkChart.on('tap', evt => {
    if (evt.target === networkChart) networkChart.elements().removeClass('highlighted faded');
  });
}

// ── Insights / Analytics ─────────────────────────────────────────────────────
function renderInsights(data) {
  const grid = document.getElementById('insights-grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📊</div><p>Keine Daten für Analyse vorhanden.</p></div>';
    return;
  }

  // Build adjacency data
  const outDeg = {}, inDeg = {}, nodes = new Set();
  const adj = {}; // adj[u][v] = 1

  data.forEach(row => {
    if (!row.Quelle || !row.Ziel) return;
    nodes.add(row.Quelle); nodes.add(row.Ziel);
    outDeg[row.Quelle] = (outDeg[row.Quelle] || 0) + 1;
    inDeg[row.Ziel]    = (inDeg[row.Ziel]    || 0) + 1;
    if (!adj[row.Quelle]) adj[row.Quelle] = {};
    adj[row.Quelle][row.Ziel] = 1;
  });

  const nodeArr = [...nodes];

  // Betweenness centrality (Brandes algorithm, unweighted)
  const bc = betweennessCentrality(nodeArr, adj);

  // Community detection (label propagation)
  const clusters = labelPropagation(nodeArr, adj);

  // Top producers (out-degree)
  const producers = nodeArr.map(n => ({ name: n, val: outDeg[n] || 0 })).sort((a,b) => b.val - a.val).slice(0, 7);
  const maxProd = producers[0]?.val || 1;

  // Top consumers (in-degree)
  const consumers = nodeArr.map(n => ({ name: n, val: inDeg[n] || 0 })).sort((a,b) => b.val - a.val).slice(0, 7);
  const maxCons = consumers[0]?.val || 1;

  // Top bottlenecks
  const bottlenecks = nodeArr.map(n => ({ name: n, val: Math.round(bc[n] || 0) })).sort((a,b) => b.val - a.val).slice(0, 7);
  const maxBc = bottlenecks[0]?.val || 1;

  grid.innerHTML = `
    ${insightCard('📤', 'Top Datenproduzenten', 'Höchster Ausgangsgrad (Out-Degree)', rankListHTML(producers, maxProd))}
    ${insightCard('📥', 'Top Datensammler', 'Höchster Eingangsgrad (In-Degree)', rankListHTML(consumers, maxCons))}
    ${insightCard('🔀', 'Flaschenhälse / Gatekeeper', 'Betweenness Centrality', rankListHTML(bottlenecks, maxBc))}
    ${insightCard('🏘', 'Datensilos / Cluster', 'Label-Propagation Community Detection', clustersHTML(clusters))}
    ${insightCard('🔒', 'Schutzbedarf-Verteilung', 'Anzahl Datenflüsse je Schutzstufe', pieHTML(data, 'Schutzbedarf', SCHUTZ_OPTS))}
    ${insightCard('⚙️', 'Erfassungsart-Verteilung', 'Manuelle vs. automatisierte Flüsse', pieHTML(data, 'Erfassungsart', ERFASSUNG_OPTS))}
  `;
}

function insightCard(icon, title, subtitle, body) {
  return `<div class="insight-card">
    <div class="insight-card-header"><span class="insight-card-icon">${icon}</span><div><div>${title}</div><div style="font-size:10px;font-weight:400;color:var(--c-muted)">${subtitle}</div></div></div>
    <div class="insight-card-body">${body}</div>
  </div>`;
}

function rankListHTML(items, maxVal) {
  if (!items.length) return '<p class="insight-empty">Keine Daten</p>';
  return `<ul class="rank-list">${items.map((item, i) => `
    <li class="rank-item">
      <span class="rank-pos">${i + 1}</span>
      <span class="rank-name" title="${esc(item.name)}">${esc(item.name)}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round((item.val / maxVal) * 100)}%"></div></div>
      <span class="rank-value">${item.val}</span>
    </li>`).join('')}</ul>`;
}

function clustersHTML(clusters) {
  if (!clusters.length) return '<p class="insight-empty">Keine Cluster erkannt</p>';
  const CLUSTER_COLORS = ['#4285F4','#34A853','#FBBC05','#EA4335','#8F44AD','#00ACC1','#FF7043'];
  return `<div class="cluster-list">${clusters.slice(0, 6).map((c, i) => `
    <div class="cluster-item">
      <div class="cluster-title" style="color:${CLUSTER_COLORS[i % CLUSTER_COLORS.length]}">Cluster ${i + 1} (${c.length} Akteure)</div>
      <div class="cluster-nodes">${c.slice(0, 5).map(n => esc(n)).join(', ')}${c.length > 5 ? ` +${c.length - 5} weitere` : ''}</div>
    </div>`).join('')}</div>`;
}

function pieHTML(data, field, opts) {
  const counts = {};
  opts.forEach(o => counts[o] = 0);
  data.forEach(r => { if (r[field] && counts[r[field]] !== undefined) counts[r[field]]++; });
  const total = data.length || 1;
  const COLORS = { 'DSGVO-relevant': '#EA4335', 'Intern': '#e67e22', 'Öffentlich': '#34A853', 'Manuell': '#8F44AD', 'Automatisiert': '#4285F4' };
  return `<ul class="rank-list">${opts.map(opt => `
    <li class="rank-item">
      <span class="rank-pos" style="background:${COLORS[opt] || '#ccc'};color:#fff;font-size:9px">${counts[opt]}</span>
      <span class="rank-name">${esc(opt)}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round((counts[opt]/total)*100)}%;background:${COLORS[opt] || '#999'}"></div></div>
      <span class="rank-value">${Math.round((counts[opt]/total)*100)}%</span>
    </li>`).join('')}</ul>`;
}

// ── Graph algorithms ──────────────────────────────────────────────────────────
function betweennessCentrality(nodes, adj) {
  const bc = {};
  nodes.forEach(n => bc[n] = 0);

  nodes.forEach(s => {
    const stack = [], pred = {}, sigma = {}, dist = {}, delta = {};
    nodes.forEach(n => { pred[n] = []; sigma[n] = 0; dist[n] = -1; delta[n] = 0; });
    sigma[s] = 1; dist[s] = 0;
    const queue = [s];
    while (queue.length) {
      const v = queue.shift();
      stack.push(v);
      const neighbors = Object.keys(adj[v] || {});
      neighbors.forEach(w => {
        if (dist[w] < 0) { queue.push(w); dist[w] = dist[v] + 1; }
        if (dist[w] === dist[v] + 1) { sigma[w] += sigma[v]; pred[w].push(v); }
      });
    }
    while (stack.length) {
      const w = stack.pop();
      pred[w].forEach(v => { delta[v] += (sigma[v] / sigma[w]) * (1 + delta[w]); });
      if (w !== s) bc[w] += delta[w];
    }
  });

  return bc;
}

function labelPropagation(nodes, adj) {
  if (!nodes.length) return [];
  const labels = {};
  nodes.forEach((n, i) => labels[n] = i);

  // Build undirected adjacency for community detection
  const uAdj = {};
  nodes.forEach(n => uAdj[n] = new Set());
  nodes.forEach(n => {
    Object.keys(adj[n] || {}).forEach(m => {
      uAdj[n].add(m);
      if (!uAdj[m]) uAdj[m] = new Set();
      uAdj[m].add(n);
    });
  });

  // Iterate
  for (let iter = 0; iter < 10; iter++) {
    let changed = false;
    const shuffled = [...nodes].sort(() => Math.random() - .5);
    shuffled.forEach(n => {
      const nbrs = [...uAdj[n]];
      if (!nbrs.length) return;
      const freq = {};
      nbrs.forEach(m => { freq[labels[m]] = (freq[labels[m]] || 0) + 1; });
      const maxFreq = Math.max(...Object.values(freq));
      const candidates = Object.keys(freq).filter(k => freq[k] === maxFreq);
      const best = parseInt(candidates[Math.floor(Math.random() * candidates.length)]);
      if (labels[n] !== best) { labels[n] = best; changed = true; }
    });
    if (!changed) break;
  }

  // Group by label
  const groups = {};
  nodes.forEach(n => {
    const l = labels[n];
    if (!groups[l]) groups[l] = [];
    groups[l].push(n);
  });

  return Object.values(groups).sort((a, b) => b.length - a.length);
}

let wizardStep = 0;
let wizardData = {};

function openWizard(prefill = {}) {
  wizardStep = 0;
  wizardData = { ...prefill };
  document.getElementById('wizard-backdrop').classList.remove('hidden');
  renderWizardStep();
}

function closeWizard() {
  document.getElementById('wizard-backdrop').classList.add('hidden');
  wizardData = {};
}

function renderWizardStep() {
  const step = WIZARD_STEPS[wizardStep];

  // Step indicators
  const indEl = document.getElementById('step-indicators');
  indEl.innerHTML = WIZARD_STEPS.map((s, i) => {
    const cls = i < wizardStep ? 'done' : i === wizardStep ? 'active' : '';
    const line = i < WIZARD_STEPS.length - 1 ? `<div class="step-line ${i < wizardStep ? 'done' : ''}"></div>` : '';
    return `<div class="step-indicator">
      <div class="step-dot ${cls}">${i < wizardStep ? '✓' : i + 1}</div>
      <span class="step-label ${i === wizardStep ? 'active' : ''}">${s.label}</span>
    </div>${line}`;
  }).join('');

  // Body
  document.getElementById('wizard-body').innerHTML = `<form id="wizard-form">${step.render()}</form>`;

  // Restore saved values
  const form = document.getElementById('wizard-form');
  Object.entries(wizardData).forEach(([k, v]) => {
    const el = form.querySelector(`[name="${k}"]`);
    if (!el) return;
    if (el.type === 'radio') {
      const radio = form.querySelector(`[name="${k}"][value="${v}"]`);
      if (radio) { radio.checked = true; radio.closest('.radio-option')?.classList.add('selected'); }
    } else { el.value = v; }
  });

  // Radio option visual feedback
  form.querySelectorAll('.radio-option input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
      form.querySelectorAll(`.radio-option input[name="${radio.name}"]`).forEach(r => r.closest('.radio-option').classList.remove('selected'));
      radio.closest('.radio-option').classList.add('selected');
    });
  });

  document.getElementById('wizard-hint').textContent = step.hint;
  document.getElementById('wizard-back').style.display = wizardStep === 0 ? 'none' : '';
  document.getElementById('wizard-next').textContent = wizardStep === WIZARD_STEPS.length - 1 ? '✓ Speichern' : 'Weiter →';
}

function collectWizardStep() {
  const form = document.getElementById('wizard-form');
  if (!form.reportValidity()) return false;
  new FormData(form).forEach((v, k) => { wizardData[k] = v; });
  return true;
}

document.getElementById('wizard-next').addEventListener('click', () => {
  if (!collectWizardStep()) return;
  if (wizardStep < WIZARD_STEPS.length - 1) {
    wizardStep++;
    renderWizardStep();
  } else {
    allData.push({ ...wizardData });
    buildSidebarFilters();
    applyFilters();
    closeWizard();
    setStatus(`Datenfluss von „${wizardData.Quelle}" zu „${wizardData.Ziel}" gespeichert.`, 'success');
  }
});

document.getElementById('wizard-back').addEventListener('click', () => {
  collectWizardStep();
  wizardStep--;
  renderWizardStep();
});

document.getElementById('wizard-cancel').addEventListener('click', closeWizard);
document.getElementById('wizard-backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) closeWizard(); });

function getCSVText() {
  const active = document.querySelector('.import-method-tab.active')?.dataset.import;
  if (active === 'paste') return Promise.resolve(document.getElementById('csv-input').value.trim());
  if (active === 'url') {
    const url = document.getElementById('csv-url').value.trim();
    if (!url) return Promise.reject(new Error('Bitte eine URL eingeben.'));
    setStatus('Lade…', 'loading');
    return fetch(url).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); });
  }
  if (active === 'file') {
    if (!pendingFileText) return Promise.reject(new Error('Bitte zuerst eine Datei auswählen.'));
    return Promise.resolve(pendingFileText);
  }
  return Promise.reject(new Error('Unbekannter Import-Modus.'));
}

function loadFile(file) {
  if (!file) return;
  document.getElementById('file-name-display').textContent = file.name;
  const r = new FileReader();
  r.onload = e => { pendingFileText = e.target.result; setStatus('Datei bereit.', 'success'); };
  r.onerror = () => setStatus('Fehler beim Lesen.', 'error');
  r.readAsText(file);
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status-message');
  el.textContent = msg;

}
